<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="skin-m" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#d4956a"/>
      <stop offset="100%" style="stop-color:#b87040"/>
    </radialGradient>
    <radialGradient id="bg-m" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#e8eef5"/>
      <stop offset="100%" style="stop-color:#c5d0e0"/>
    </radialGradient>
    <radialGradient id="hair-m" cx="50%" cy="20%" r="70%">
      <stop offset="0%" style="stop-color:#2a1a0e"/>
      <stop offset="100%" style="stop-color:#1a1008"/>
    </radialGradient>
    <clipPath id="circle-clip-m">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg-m)"/>

  <g clip-path="url(#circle-clip-m)">
    <!-- Shirt / body -->
    <rect x="50" y="310" width="300" height="180" fill="#2d3748"/>
    <!-- Collar -->
    <rect x="170" y="270" width="60" height="80" fill="#e8ddd0"/>
    <!-- Shirt open collar -->
    <path d="M170,270 L155,310 L200,295 L245,310 L230,270 Z" fill="#e8ddd0"/>

    <!-- Neck -->
    <rect x="180" y="255" width="40" height="50" fill="url(#skin-m)"/>

    <!-- Head - slightly larger, more square jaw for man -->
    <ellipse cx="200" cy="205" rx="75" ry="82" fill="url(#skin-m)"/>

    <!-- Hair - short dark -->
    <ellipse cx="200" cy="150" rx="78" ry="42" fill="url(#hair-m)"/>
    <path d="M122,168 Q125,155 135,148 Q160,130 200,126 Q240,130 265,148 Q275,155 278,168 Q255,145 200,140 Q145,145 122,168 Z" fill="#2a1a0e"/>
    <!-- Short hair sides -->
    <path d="M122,168 Q118,185 122,210 Q130,195 132,178 Z" fill="url(#hair-m)"/>
    <path d="M278,168 Q282,185 278,210 Q270,195 268,178 Z" fill="url(#hair-m)"/>

    <!-- Ears -->
    <ellipse cx="125" cy="210" rx="12" ry="16" fill="url(#skin-m)"/>
    <ellipse cx="275" cy="210" rx="12" ry="16" fill="url(#skin-m)"/>

    <!-- Eyebrows - slightly thicker for man -->
    <path d="M153,188 Q168,183 187,185" stroke="#2a1a0e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M213,185 Q232,183 248,188" stroke="#2a1a0e" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <g>
      <!-- Left eye -->
      <ellipse cx="170" cy="207" rx="17" ry="11" fill="white"/>
      <ellipse cx="170" cy="207" rx="10" ry="10" fill="#3d2818"/>
      <circle cx="170" cy="206" r="6" fill="#1a0e06"/>
      <circle cx="173" cy="203" r="2" fill="white"/>
      <path d="M153,207 Q162,200 170,201 Q178,200 187,207" stroke="#2a1a0e" stroke-width="1.5" fill="none"/>
    </g>
    <g>
      <!-- Right eye -->
      <ellipse cx="230" cy="207" rx="17" ry="11" fill="white"/>
      <ellipse cx="230" cy="207" rx="10" ry="10" fill="#3d2818"/>
      <circle cx="230" cy="206" r="6" fill="#1a0e06"/>
      <circle cx="233" cy="203" r="2" fill="white"/>
      <path d="M213,207 Q222,200 230,201 Q238,200 247,207" stroke="#2a1a0e" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Nose - more defined for man -->
    <path d="M196,218 Q190,240 185,245 Q193,249 200,249 Q207,249 215,245 Q210,240 204,218" stroke="#a06840" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- Mouth - confident smile -->
    <path d="M178,260 Q200,274 222,260" stroke="#8a5030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M178,260 Q200,268 222,260" fill="#c07850" opacity="0.5"/>

    <!-- Light beard / stubble suggestion -->
    <ellipse cx="200" cy="265" rx="52" ry="22" fill="#9a6840" opacity="0.12"/>

    <!-- Slight cheek definition -->
    <path d="M140,225 Q145,250 155,265" stroke="#a06840" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M260,225 Q255,250 245,265" stroke="#a06840" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Ring border -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#c5d0e0" stroke-width="4"/>
</svg>
